<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BagsAndBeyond Offline</title>
    <style>
      :root {
        color-scheme: light;
        --primary: #e8738a;
        --background: #fdf6f0;
        --surface: #ffffff;
        --text: #1a1a1a;
        --muted: #7a6e6e;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: var(--background);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(420px, 100%);
        background: var(--surface);
        border: 1px solid #f5d5dc;
        border-radius: 18px;
        padding: 32px;
        text-align: center;
        box-shadow: 0 18px 50px rgba(26, 26, 26, 0.08);
      }

      img {
        width: 72px;
        height: 72px;
        margin-bottom: 18px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 28px;
        line-height: 1.15;
      }

      p {
        margin: 0 0 24px;
        color: var(--muted);
        line-height: 1.6;
      }

      a, button {
        display: inline-flex;
        justify-content: center;
        align-items: center;
        min-height: 44px;
        padding: 0 22px;
        border: 0;
        border-radius: 999px;
        background: var(--primary);
        color: white;
        font: inherit;
        font-weight: 700;
        text-decoration: none;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/pwa-icon.svg" alt="" />
      <h1>You are offline</h1>
      <p>You can keep browsing pages that were already saved on this device. Checkout, payment, and order tracking need an internet connection.</p>
      <button type="button" onclick="window.location.reload()">Try Again</button>
    </main>
  </body>
</html>
